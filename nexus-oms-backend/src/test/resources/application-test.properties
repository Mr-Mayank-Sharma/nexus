server.port=0
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:h2:mem:nexus_oms_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.cache.type=none

spring.flyway.enabled=false

spring.kafka.consumer.group-id=nexus-oms-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.jwt.secret=ThisIsATestJwtSecretKeyThatIsAtLeast32Characters!!
app.jwt.expiration-ms=86400000

logging.level.com.nexus=DEBUG
logging.level.org.springframework.security=TRACE

rate-cache.ttl-minutes=15
idempotency.lock-timeout-seconds=10
idempotency.ttl-hours=24

app.cors.allowed-origins=*

storage.s3.endpoint=http://localhost:9000
storage.s3.region=us-east-1
storage.s3.access-key=testaccesskey
storage.s3.secret-key=testsecretkey
storage.s3.bucket=test-bucket

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=false
management.health.kafka.enabled=false
