server.port=${PORT:8080}
server.servlet.context-path=/api/v1

spring.main.lazy-initialization=true
spring.main.allow-circular-references=false

spring.datasource.url=${NEXUS_DB_URL:jdbc:postgresql://localhost:5433/nexus_oms}
spring.datasource.username=${NEXUS_DB_USERNAME:nexus}
spring.datasource.password=${NEXUS_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

nexus.cache.enabled=${NEXUS_CACHE_ENABLED:false}

spring.cache.type=${SPRING_CACHE_TYPE:none}
spring.cache.redis.time-to-live=5m
spring.cache.redis.cache-null-values=false
spring.cache.redis.use-key-prefix=true

spring.data.redis.host=${NEXUS_REDIS_HOST:localhost}
spring.data.redis.port=${NEXUS_REDIS_PORT:6379}
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=2000
spring.data.redis.lettuce.shutdown-timeout=1000

# Disable Redis health indicator by default - app handles Redis unavailability gracefully
# Set NEXUS_REDIS_HEALTH_ENABLED=true in local dev if you want Redis in health checks
management.health.redis.enabled=${NEXUS_REDIS_HEALTH_ENABLED:false}

rate-cache.ttl-minutes=15
idempotency.lock-timeout-seconds=10
idempotency.ttl-hours=24

storage.s3.enabled=${NEXUS_S3_ENABLED:false}
storage.s3.endpoint=${NEXUS_S3_ENDPOINT:http://localhost:9000}
storage.s3.region=${NEXUS_S3_REGION:us-east-1}
storage.s3.access-key=${NEXUS_S3_ACCESS_KEY:minioadmin}
storage.s3.secret-key=${NEXUS_S3_SECRET_KEY:minioadmin}
storage.s3.bucket=${NEXUS_S3_BUCKET:nexus-shipping-labels}

spring.kafka.bootstrap-servers=${NEXUS_KAFKA_BOOTSTRAP:localhost:9092}
spring.kafka.security.protocol=${NEXUS_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.security.protocol=${NEXUS_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${NEXUS_KAFKA_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${NEXUS_KAFKA_SASL_JAAS_CONFIG:}
spring.kafka.listener.auto-start=${NEXUS_KAFKA_LISTENER_AUTO_START:true}
nexus.kafka.enabled=${NEXUS_KAFKA_ENABLED:false}
spring.autoconfigure.exclude=${NEXUS_AUTOCONFIG_EXCLUDE:org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration}
spring.kafka.consumer.group-id=nexus-oms-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.listener.ack-mode=record

app.jwt.secret=${NEXUS_JWT_SECRET}
app.jwt.expiration-ms=900000

nexus.ai.base-url-ops=http://localhost:5000
nexus.ai.base-url-intel=http://localhost:5001
nexus.ai.openai.api-key=
nexus.ai.openai.model=gpt-4o

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

logging.config=classpath:logback-spring.xml

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

spring.jackson.serialization.write-dates-as-timestamps=false

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
spring.servlet.multipart.enabled=true

