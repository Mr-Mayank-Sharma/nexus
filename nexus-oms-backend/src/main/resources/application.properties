app.frontend-url=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173

# --- Resilience4j Circuit Breaker Configuration ---
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=20
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.connector-rest.sliding-window-size=10
resilience4j.circuitbreaker.instances.connector-rest.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.connector-rest.failure-rate-threshold=40

resilience4j.circuitbreaker.instances.ai-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.ai-service.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.ai-service.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.shopify-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.shopify-api.failure-rate-threshold=40

resilience4j.circuitbreaker.instances.bigcommerce-api.sliding-window-size=10
resilience4j.circuitbreaker.instances.bigcommerce-api.failure-rate-threshold=40

resilience4j.retry.configs.default.max-attempts=3
resilience4j.retry.configs.default.wait-duration=500ms
resilience4j.retry.configs.default.exponential-backoff-multiplier=2
resilience4j.retry.configs.default.enable-exponential-backoff=true

resilience4j.retry.instances.connector-rest.max-attempts=3
resilience4j.retry.instances.connector-rest.wait-duration=1s
