name: CD

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nexus-oms

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # Determine deployment target and image tag
  # ──────────────────────────────────────────────
  prepare:
    name: Prepare deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.env.outputs.image_tag }}
      backend_image: ${{ steps.env.outputs.backend_image }}
      frontend_image: ${{ steps.env.outputs.frontend_image }}
      ai_image: ${{ steps.env.outputs.ai_image }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "image_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "image_tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi
          echo "backend_image=${REGISTRY}/${IMAGE_PREFIX}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${IMAGE_PREFIX}-frontend" >> "$GITHUB_OUTPUT"
          echo "ai_image=${REGISTRY}/${IMAGE_PREFIX}-ai" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Build and push all container images to GHCR
  # ──────────────────────────────────────────────
  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [prepare]
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            context: .
            dockerfile: ./Dockerfile
            image: ${{ needs.prepare.outputs.backend_image }}
          - name: frontend
            context: ./nexus-oms-frontend
            dockerfile: ./nexus-oms-frontend/Dockerfile
            image: ${{ needs.prepare.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push — ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Trivy scan — ${{ matrix.name }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

  # ──────────────────────────────────────────────
  # Deploy to Staging
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [prepare, build-images]
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.nexus-ship.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/nexus-ship
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose exec -T backend java -jar /app/app.jar --spring.profiles.active=staging &
            sleep 15
            curl -sf http://localhost:8080/api/v1/actuator/health || exit 1
            echo "✅ Staging deployment successful"

      - name: Notify deployment
        if: success()
        run: |
          echo "🚀 Staging deployed: ${{ needs.prepare.outputs.image_tag }}"

  # ──────────────────────────────────────────────
  # Deploy to Production
  # ──────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [prepare, build-images]
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: https://nexus-ship.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/nexus-ship
            # Tag current images for rollback
            docker compose exec -T backend cat /app/app.jar.md5 > /opt/nexus-ship/.rollback-tag 2>/dev/null || true
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 20
            curl -sf http://localhost:8080/api/v1/actuator/health || {
              echo "❌ Health check failed — initiating rollback"
              docker compose down
              # Restore previous image tags if rollback tag exists
              if [ -f /opt/nexus-ship/.rollback-tag ]; then
                docker compose up -d
              fi
              exit 1
            }
            echo "✅ Production deployment successful: ${{ needs.prepare.outputs.image_tag }}"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              generate_release_notes: true,
              draft: false,
              prerelease: tag.includes('-rc') || tag.includes('-beta')
            });

      - name: Notify deployment
        if: success()
        run: |
          echo "🚀 Production deployed: ${{ needs.prepare.outputs.image_tag }}"
