name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────
  # Backend: build, test, coverage, SAST, dependency audit
  # ──────────────────────────────────────────────
  backend:
    name: Backend (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexus-oms-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile and run tests with JaCoCo
        run: mvn verify -B

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-backend-report
          path: nexus-oms-backend/target/site/jacoco/
          retention-days: 14

      - name: OWASP dependency-check
        run: mvn dependency-check:check -B
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: nexus-oms-backend/target/dependency-check-report.*
          retention-days: 14

  # ──────────────────────────────────────────────
  # Frontend: install, lint, build, audit
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ env.NODE_VERSION }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexus-oms-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexus-oms-frontend/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Python AI services: install + pip-audit
  # ──────────────────────────────────────────────
  python-ai:
    name: AI Service 1
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./supply_chain_ai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: supply_chain_ai/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit
        continue-on-error: true

  python-ai2:
    name: AI Service 2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./supply_chain_ai2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: supply_chain_ai2/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit
        continue-on-error: true

  # ──────────────────────────────────────────────
  # CodeQL: SAST static analysis (separate job, runs in parallel)
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [java, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config: |
            paths-ignore:
              - '**/node_modules'
              - '**/target'
              - '**/dist'
              - 'supply_chain_ai/**'
              - 'supply_chain_ai2/**'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ──────────────────────────────────────────────
  # SonarQube: code quality + security analysis
  # Requires secrets: SONAR_TOKEN, SONAR_HOST_URL
  # ──────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube blame data

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-backend-report
          path: nexus-oms-backend/target/site/jacoco/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=nexus-ship
            -Dsonar.organization=nexus-ship
            -Dsonar.sources=nexus-oms-backend/src/main/java
            -Dsonar.tests=nexus-oms-backend/src/test/java
            -Dsonar.java.binaries=nexus-oms-backend/target/classes
            -Dsonar.java.libraries=nexus-oms-backend/target/dependency
            -Dsonar.coverage.jacoco.xmlReportPaths=nexus-oms-backend/target/site/jacoco/jacoco.xml
            -Dsonar.qualitygate.wait=true

      - name: SonarQube Quality Gate Check
        if: always()
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ──────────────────────────────────────────────
  # Docker build + Trivy container scan
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build & Container Scan
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: nexus-oms-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan — OS vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexus-oms-backend:test
          format: sarif
          output: trivy-os-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Trivy scan — application vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexus-oms-backend:test
          format: sarif
          output: trivy-app-results.sarif
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-os-results.sarif
          category: trivy-os

      - name: Upload Trivy SARIF (app)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-app-results.sarif
          category: trivy-app
