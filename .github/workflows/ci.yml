name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexus-oms-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - run: mvn verify -q
      - run: mvn dependency-check:check -q
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nexus-oms-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high
        continue-on-error: true

  python-ai:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./supply_chain_ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit
        continue-on-error: true

  python-ai2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./supply_chain_ai2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      - run: pip-audit
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, python-ai, python-ai2]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
