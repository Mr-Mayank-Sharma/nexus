global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'nexus-oms-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
        labels:
          application: 'nexus-oms'
          environment: 'production'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
        labels:
          application: 'nexus-oms'
          service: 'kafka'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          application: 'nexus-oms'
          service: 'redis'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          application: 'nexus-oms'
          service: 'postgres'
