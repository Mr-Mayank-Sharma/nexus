# SonarQube project configuration
sonar.projectKey=nexus-ship
sonar.organization=nexus-ship

# Source and test directories
sonar.sources=nexus-oms-backend/src/main/java
sonar.tests=nexus-oms-backend/src/test/java

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=17
sonar.java.target=17

# JaCoCo coverage report path
sonar.coverage.jacoco.xmlReportPaths=nexus-oms-backend/target/site/jacoco/jacoco.xml

# Exclusions (frontend, AI services, generated code)
sonar.exclusions=**/node_modules/**,**/target/**,**/dist/**,supply_chain_ai/**,supply_chain_ai2/**

# Issue exclusions
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e1.message=String literals should not be duplicated
