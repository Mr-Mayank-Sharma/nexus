services:
  - type: web
    name: nexus-oms-backend
    runtime: java
    plan: free
    buildCommand: cd nexus-oms-backend && mvn clean package -DskipTests -pl . -am
    startCommand: cd nexus-oms-backend && java -jar target/oms-1.0.0.jar
    healthCheckPath: /api/v1/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: NEXUS_KAFKA_ENABLED
        value: "false"
      - key: NEXUS_KAFKA_LISTENER_AUTO_START
        value: "false"
      - key: SPRING_AUTOCONFIGURE_EXCLUDE
        value: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - key: NEXUS_DB_URL
        sync: false
      - key: NEXUS_DB_USERNAME
        sync: false
      - key: NEXUS_DB_PASSWORD
        sync: false
      - key: NEXUS_REDIS_HOST
        sync: false
      - key: NEXUS_REDIS_PORT
        sync: false
      - key: NEXUS_CACHE_ENABLED
        value: "false"
      - key: SPRING_CACHE_TYPE
        value: none
      - key: NEXUS_REDIS_HEALTH_ENABLED
        value: "false"
      - key: NEXUS_JWT_SECRET
        sync: false
      - key: STORAGE_S3_ENABLED
        value: "false"
      - key: APP_FRONTEND_URL
        value: https://nexus-silk-five-61.vercel.app
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://nexus-silk-five-61.vercel.app
